services:
  app:
    build: .
    container_name: veerhau-companion
    restart: unless-stopped
    environment:
      CHRONICLE_PASSWORD: ${CHRONICLE_PASSWORD:-veerhau}
      CHRONICLE_HOST: 0.0.0.0
      CHRONICLE_PORT: 8787
      CHRONICLE_DATA_DIR: /data
    ports:
      - "8787:8787"
    volumes:
      - chronicle-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/session', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: veerhau-companion-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:8787
    depends_on:
      - app
    profiles:
      - tunnel

volumes:
  chronicle-data:
